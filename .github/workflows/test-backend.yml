name: Test Backend

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check api/ --exclude api/venv

      # Integration tests (@pytest.mark.integration) are excluded in CI to avoid
      # consuming API quota. Run integration tests manually before deployment.
      - name: Run backend unit tests (no integration)
        working-directory: api
        env:
          GROQ_API_KEY_HEAVY: test-groq-heavy
          GROQ_API_KEY_LIGHT: test-groq-light
          GOOGLE_API_KEY: test-google-key
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: test-supabase-anon-key
        run: pytest tests/ -v -m "not integration"
